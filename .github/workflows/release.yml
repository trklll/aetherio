name: Publish Aetherio

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Install MPV runtime
        shell: pwsh
        run: ./scripts/install-mpv.ps1

      - name: Build and publish signed update
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: v__VERSION__
          releaseName: "Aetherio v__VERSION__"
          releaseBody: "Nueva versión de Aetherio. Consulta los cambios incluidos en esta versión y descarga el instalador para Windows."
          releaseDraft: false
          prerelease: false
